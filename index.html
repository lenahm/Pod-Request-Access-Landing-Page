<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Pod Request Access Landing Page</title>
</head>
<body>
    <div class="container">
        <img src="./assets/bg-pattern-dots.svg" class="dots">
        <nav>
            <img src="./assets/logo.svg" alt="pod Logo" class="logo">
        </nav>
        <main>
            <h1><span class="highlight">Publish your Podcasts</span><br> everywhere.</h1>
            <p>Upload your audio to Pod with a single click. We'll then distribute your podcast to Spotify, Apple Podcats, Google Podcasts, Pocket Casts and more!</p>
            <div class="input-group">
                <input type="text" placeholder="Email address">
                <button type="submit">Request Access</button>
            </div>
            <div class="logos">
                <img src="./assets/spotify.svg" alt="Spotify Logo">
                <img src="./assets/apple-podcast.svg" alt="Apple Podcasts Logo">
                <img src="./assets/google-podcasts.svg" alt="Google Podcasts Logo">
                <img src="./assets/pocket-casts.svg" alt="Pocket Casts Logo">
            </div>
        </main>
    </div>
</body>
</html>
